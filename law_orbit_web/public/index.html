<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawOrbit — Legal Case Management Platform</title>
    <meta name="description"
        content="LawOrbit is India's premier legal case management platform for lawyers, clients, clerks and administrators.">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script>if (!document.querySelector('.ph')) { var s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1'; document.head.appendChild(s); }</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div id="app"></div>
    <div id="toast-container"></div>

    <!-- Cookie Consent Banner -->
    <div id="cookieBanner" class="cookie-banner" style="display:none">
        <p><i class="ph ph-cookie" style="margin-right:6px"></i>
            We use cookies to enhance your experience, analyze site traffic, and for security purposes.
            By continuing to use LawOrbit, you consent to our use of cookies in accordance with
            India's IT Act, 2000 and our <a href="#">Privacy Policy</a>.
        </p>
        <div class="cookie-btns">
            <button class="btn-decline" onclick="declineCookies()">Decline</button>
            <button class="btn-accept" onclick="acceptCookies()">Accept All Cookies</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ui-pages.js"></script>
    <script src="js/ui-pages2.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
